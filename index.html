<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Steam Inventory Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #090b10;
      --panel: #10141c;
      --panel2: #151b25;
      --panel3: #1b2430;
      --line: #273141;
      --line2: #344155;
      --text: #edf3fb;
      --muted: #8a98aa;
      --soft: #b8c4d2;
      --accent: #f0b84f;
      --accent2: #72c7ff;
      --good: #42d392;
      --bad: #ff6673;
      --warn: #ffcf66;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --sans: Inter, system-ui, sans-serif;
      --r: 8px;
    }
    html { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(37,47,62,.72), transparent 340px),
        radial-gradient(circle at 70% 0%, rgba(114,199,255,.14), transparent 360px),
        var(--bg);
    }
    button, input, select { font: inherit; }
    button, select { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 22px;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      align-items: start;
      gap: 16px;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .kicker {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: .95;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .pill, .tab, .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(16,20,28,.78);
      color: var(--soft);
    }
    .pill { padding: 0 10px; gap: 7px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .icon-btn {
      width: 38px;
      color: var(--muted);
    }
    .icon-btn:hover, .tab:hover, select:hover { border-color: var(--line2); color: var(--text); }
    .icon-btn.active, .tab.active {
      border-color: rgba(240,184,79,.8);
      color: var(--accent);
      background: rgba(240,184,79,.1);
    }
    .grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .side, .panel {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16,20,28,.88);
      box-shadow: 0 18px 60px rgba(0,0,0,.18);
    }
    .side {
      position: sticky;
      top: 16px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .control {
      display: grid;
      gap: 7px;
    }
    .label {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b0f15;
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }
    .input:focus, select:focus { border-color: var(--accent2); }
    .seg {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .tab {
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
    }
    .range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .content { display: grid; gap: 16px; min-width: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(16,20,28,.88);
      padding: 14px;
      min-width: 0;
    }
    .stat .label { margin-bottom: 8px; }
    .value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 23px;
      font-weight: 700;
      color: var(--text);
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pos { color: var(--good); }
    .neg { color: var(--bad); }
    .accent { color: var(--accent); }
    .blue { color: var(--accent2); }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 0;
    }
    .panel-title {
      font-family: var(--mono);
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .chart-wrap {
      height: 330px;
      padding: 12px 14px 14px;
    }
    .market-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, .6fr);
      gap: 16px;
    }
    .insights {
      display: grid;
      gap: 10px;
      padding: 14px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) 90px;
      gap: 10px;
      align-items: center;
      color: var(--soft);
      font-size: 13px;
    }
    .bar {
      height: 7px;
      border-radius: 99px;
      background: #0a0e14;
      overflow: hidden;
      margin-top: 5px;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .items-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    .items-count {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .table-wrap { overflow: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #111722;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .05em;
      text-transform: uppercase;
      user-select: none;
    }
    th[data-sort] { cursor: pointer; }
    th[data-sort]:hover { color: var(--text); }
    td { color: var(--soft); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,.025); }
    .item-cell {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 320px;
    }
    .thumb {
      width: 54px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0a0e14;
      object-fit: contain;
    }
    .item-name {
      color: var(--text);
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .chip {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }
    .num {
      text-align: right;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 10px;
      padding: 14px;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(21,27,37,.75);
      padding: 12px;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 12px;
    }
    .item-card .thumb { width: 74px; height: 58px; }
    .card-price {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .empty {
      padding: 42px 14px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }
    .hidden { display: none !important; }
    @media (max-width: 1180px) {
      .grid { grid-template-columns: 1fr; }
      .side { position: static; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .market-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .app { padding: 14px; }
      .topbar, .items-head { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .side { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .value { font-size: 19px; }
      .chart-wrap { height: 270px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="kicker" data-i18n="kicker">Counter-Strike 2 Market Portfolio</div>
        <h1 data-i18n="title">Steam Inventory Tracker</h1>
        <div class="meta">
          <span id="updated-pill" class="pill">-</span>
          <span id="currency-pill" class="pill">EUR</span>
          <span id="partial-pill" class="pill hidden">Partial</span>
        </div>
      </div>
      <div class="toolbar">
        <button class="icon-btn" id="lang-btn" title="Language">DE</button>
        <button class="icon-btn" id="export-btn" title="Export CSV">CSV</button>
        <button class="icon-btn" id="copy-btn" title="Copy market links">URL</button>
      </div>
    </header>

    <section class="grid">
      <aside class="side">
        <div class="control">
          <span class="label" data-i18n="search">Search</span>
          <input id="search" class="input" type="search" autocomplete="off" />
        </div>
        <div class="control">
          <span class="label" data-i18n="priceBasis">Price Basis</span>
          <div class="seg">
            <button class="tab active" data-basis="median" data-i18n="median">Median</button>
            <button class="tab" data-basis="lowest" data-i18n="lowest">Lowest</button>
            <button class="tab" data-basis="history" data-i18n="history">History</button>
          </div>
        </div>
        <div class="control">
          <span class="label" data-i18n="view">View</span>
          <div class="seg">
            <button class="tab active" data-view="table" data-i18n="table">Table</button>
            <button class="tab" data-view="cards" data-i18n="cards">Cards</button>
          </div>
        </div>
        <div class="control">
          <span class="label" data-i18n="sort">Sort</span>
          <select id="sort-select">
            <option value="total_desc" data-i18n="sortTotalDesc">Total value</option>
            <option value="unit_desc" data-i18n="sortUnitDesc">Unit price</option>
            <option value="qty_desc" data-i18n="sortQtyDesc">Quantity</option>
            <option value="name_asc" data-i18n="sortNameAsc">Name</option>
            <option value="watch_desc" data-i18n="sortWatch">Watchlist first</option>
          </select>
        </div>
        <div class="control">
          <span class="label" data-i18n="filters">Filters</span>
          <select id="type-filter"></select>
          <select id="exterior-filter"></select>
          <select id="rarity-filter"></select>
          <select id="account-filter"></select>
        </div>
        <div class="control">
          <span class="label" data-i18n="unitRange">Unit Range</span>
          <div class="range">
            <input id="min-price" class="input" inputmode="decimal" />
            <input id="max-price" class="input" inputmode="decimal" />
          </div>
        </div>
        <div class="control">
          <span class="label" data-i18n="quick">Quick</span>
          <div class="seg">
            <button class="tab" id="watch-filter" data-i18n="watchlist">Watchlist</button>
            <button class="tab" id="missing-filter" data-i18n="missing">No price</button>
          </div>
        </div>
      </aside>

      <div class="content">
        <section class="stats" id="stats"></section>

        <section class="market-grid">
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title" data-i18n="chartTitle">Portfolio Value</div>
              <div class="toolbar">
                <button class="tab" data-span="30">30D</button>
                <button class="tab" data-span="90">90D</button>
                <button class="tab" data-span="365">1Y</button>
                <button class="tab active" data-span="all">ALL</button>
                <button class="tab active" id="backtrack-toggle">BT</button>
                <button class="tab active" id="events-toggle">POI</button>
              </div>
            </div>
            <div class="chart-wrap"><canvas id="value-chart"></canvas></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title" data-i18n="allocation">Allocation</div>
              <select id="allocation-mode">
                <option value="type" data-i18n="byType">Type</option>
                <option value="exterior" data-i18n="byExterior">Exterior</option>
                <option value="rarity" data-i18n="byRarity">Rarity</option>
                <option value="account" data-i18n="byAccount">Account</option>
              </select>
            </div>
            <div class="insights" id="allocation-list"></div>
          </div>
        </section>

        <section class="panel">
          <div class="items-head">
            <div>
              <div class="panel-title" data-i18n="itemsTitle">Market Items</div>
              <div class="items-count" id="items-count"></div>
            </div>
            <div class="toolbar">
              <button class="tab" id="clear-btn" data-i18n="clear">Clear</button>
            </div>
          </div>
          <div id="table-view" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th data-sort="watch">★</th>
                  <th data-sort="name" data-i18n="item">Item</th>
                  <th data-sort="qty" class="num" data-i18n="qty">Qty</th>
                  <th data-sort="unit" class="num" data-i18n="unit">Unit</th>
                  <th data-sort="total" class="num" data-i18n="total">Total</th>
                  <th data-i18n="market">Market</th>
                </tr>
              </thead>
              <tbody id="items-tbody"></tbody>
            </table>
          </div>
          <div id="card-view" class="cards hidden"></div>
          <div id="empty" class="empty hidden" data-i18n="empty">No matching items.</div>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
  <script>
  'use strict';

  const I18N = {
    en: {
      kicker: 'Counter-Strike 2 Market Portfolio',
      title: 'Steam Inventory Tracker',
      search: 'Search', priceBasis: 'Price Basis', median: 'Median', lowest: 'Lowest', history: 'History',
      view: 'View', table: 'Table', cards: 'Cards', sort: 'Sort', filters: 'Filters',
      unitRange: 'Unit Range', quick: 'Quick', watchlist: 'Watchlist', missing: 'No price',
      sortTotalDesc: 'Total value', sortUnitDesc: 'Unit price', sortQtyDesc: 'Quantity',
      sortNameAsc: 'Name', sortWatch: 'Watchlist first', chartTitle: 'Portfolio Value',
      allocation: 'Allocation', byType: 'Type', byExterior: 'Exterior', byRarity: 'Rarity',
      byAccount: 'Account', itemsTitle: 'Market Items', clear: 'Clear',
      item: 'Item', qty: 'Qty', unit: 'Unit', total: 'Total', market: 'Market',
      empty: 'No matching items.', all: 'All', typeAll: 'All types', exteriorAll: 'All exteriors',
      rarityAll: 'All rarities', accountAll: 'All accounts', latest: 'Latest Value',
      daily: '24h', month: '30D', itemCount: 'Items', topItem: 'Top Item',
      priced: 'Priced', liquidity: 'Commodity', updatedToday: 'Updated today',
      updatedAgo: 'Updated {n}d ago', noDate: 'No history', partial: 'Partial',
      linksCopied: 'Copied', noLinks: 'No links',
      backtracked: 'Backtracked current inventory',
    },
    de: {
      kicker: 'Counter-Strike 2 Marktportfolio',
      title: 'Steam Inventar Tracker',
      search: 'Suche', priceBasis: 'Preisquelle', median: 'Median', lowest: 'Niedrigst', history: 'Historie',
      view: 'Ansicht', table: 'Tabelle', cards: 'Karten', sort: 'Sortierung', filters: 'Filter',
      unitRange: 'Stückpreis', quick: 'Schnell', watchlist: 'Watchlist', missing: 'Ohne Preis',
      sortTotalDesc: 'Gesamtwert', sortUnitDesc: 'Stückpreis', sortQtyDesc: 'Anzahl',
      sortNameAsc: 'Name', sortWatch: 'Watchlist zuerst', chartTitle: 'Portfoliowert',
      allocation: 'Aufteilung', byType: 'Typ', byExterior: 'Zustand', byRarity: 'Seltenheit',
      byAccount: 'Account', itemsTitle: 'Marktitems', clear: 'Zurücksetzen',
      item: 'Item', qty: 'Anz.', unit: 'Stück', total: 'Gesamt', market: 'Markt',
      empty: 'Keine passenden Items.', all: 'Alle', typeAll: 'Alle Typen', exteriorAll: 'Alle Zustände',
      rarityAll: 'Alle Seltenheiten', accountAll: 'Alle Accounts', latest: 'Aktueller Wert',
      daily: '24h', month: '30T', itemCount: 'Items', topItem: 'Top Item',
      priced: 'Bepreist', liquidity: 'Commodity', updatedToday: 'Heute aktualisiert',
      updatedAgo: 'Vor {n} Tagen', noDate: 'Keine Historie', partial: 'Teilweise',
      linksCopied: 'Kopiert', noLinks: 'Keine Links',
      backtracked: 'Aktuelles Inventar rückgerechnet',
    },
  };

  const LS = {
    lang: 'steam_tracker_lang',
    basis: 'steam_tracker_basis',
    view: 'steam_tracker_view',
    watch: 'steam_tracker_watch',
  };
  let lang = localStorage.getItem(LS.lang) || 'en';
  let basis = localStorage.getItem(LS.basis) || 'median';
  let view = localStorage.getItem(LS.view) || 'table';
  let currency = 'EUR';
  let itemsData = { items: [] };
  let history = { labels: [], lowest: [], median: [] };
  let backtracked = { labels: [], value: [], coverage: [] };
  let historyByItem = new Map();
  let accounts = [];
  let chart = null;
  let span = 'all';
  let showBacktrack = true;
  let showEvents = true;
  let onlyWatch = false;
  let onlyMissing = false;
  let watch = new Set(JSON.parse(localStorage.getItem(LS.watch) || '[]'));

  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const tr = (key, params = {}) => {
    const str = (I18N[lang] || I18N.en)[key] || I18N.en[key] || key;
    return str.replace(/\{(\w+)\}/g, (_, k) => params[k] ?? '');
  };
  const esc = s => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const money = v => Number.isFinite(v) ? new Intl.NumberFormat(undefined, { style: 'currency', currency }).format(v) : '-';
  const num = v => Number.isFinite(v) ? new Intl.NumberFormat(undefined).format(v) : '-';
  const pct = (a, b) => Number.isFinite(a) && Number.isFinite(b) && b ? ((a - b) / b) * 100 : null;
  const inputNumber = value => {
    const raw = String(value ?? '').trim();
    if (!raw) return null;
    const parsed = Number(raw.replace(',', '.'));
    return Number.isFinite(parsed) ? parsed : null;
  };
  const latestPoint = points => {
    if (!Array.isArray(points)) return null;
    for (let i = points.length - 1; i >= 0; i--) {
      const price = Number(points[i]?.price);
      if (Number.isFinite(price) && price > 0) return points[i];
    }
    return null;
  };
  const itemUnit = it => {
    if (basis === 'history') {
      const point = latestPoint(historyByItem.get(it.name));
      return point ? Number(point.price) : null;
    }
    const primary = Number(it[basis]);
    if (Number.isFinite(primary) && primary > 0) return primary;
    const fallbackKey = basis === 'median' ? 'lowest' : 'median';
    const fallback = Number(it[fallbackKey]);
    return Number.isFinite(fallback) && fallback > 0 ? fallback : null;
  };
  const itemTotal = it => {
    if (basis === 'history') {
      const unit = itemUnit(it);
      return unit ? unit * (Number(it.qty) || 0) : 0;
    }
    const direct = Number(it[`total_${basis}`]);
    if (Number.isFinite(direct) && direct > 0) return direct;
    const fallbackKey = basis === 'median' ? 'total_lowest' : 'total_median';
    const fallback = Number(it[fallbackKey]);
    if (Number.isFinite(fallback) && fallback > 0) return fallback;
    const unit = itemUnit(it);
    return unit ? unit * (Number(it.qty) || 0) : 0;
  };
  const clean = v => (v == null || v === '') ? '-' : String(v);
  const family = it => [it.type, it.exterior, it.rarity].filter(Boolean).slice(0, 3);
  const EVENTS = [
    { date: '2023-09-27', label: 'CS2 launch', type: 'major' },
    { date: '2024-02-07', label: 'A Call To Arms / Kilowatt Case', type: 'case' },
    { date: '2024-10-03', label: 'The Armory / Gallery Case', type: 'major' },
    { date: '2025-03-31', label: 'Fever Case', type: 'case' },
    { date: '2025-09-16', label: 'Genesis Terminal', type: 'terminal' },
    { date: '2026-03-12', label: 'Dead Hand Terminal', type: 'terminal' },
    { date: '2026-05-12', label: 'Steam Market overhaul', type: 'market' },
  ];

  const eventPlugin = {
    id: 'csEvents',
    afterDatasetsDraw(chart) {
      if (!chart.options.plugins.csEvents?.enabled) return;
      const labels = chart.data.labels || [];
      const visible = EVENTS.filter(ev => labels.includes(ev.date));
      if (!visible.length) return;
      const { ctx, chartArea, scales } = chart;
      ctx.save();
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.textBaseline = 'middle';
      visible.forEach((ev, idx) => {
        const x = scales.x.getPixelForValue(labels.indexOf(ev.date));
        if (x < chartArea.left || x > chartArea.right) return;
        ctx.strokeStyle = ev.type === 'case' ? 'rgba(240,184,79,.72)' : 'rgba(114,199,255,.72)';
        ctx.fillStyle = ctx.strokeStyle;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        const label = ev.label.length > 24 ? `${ev.label.slice(0, 23)}...` : ev.label;
        const y = Math.min(chartArea.bottom - 14, chartArea.top + 34 + (idx % 5) * 18);
        ctx.textAlign = x > chartArea.right - 170 ? 'right' : 'left';
        ctx.fillText(label, x > chartArea.right - 170 ? x - 6 : x + 6, y);
      });
      ctx.restore();
    },
  };
  Chart.register(eventPlugin);

  function applyI18n() {
    document.documentElement.lang = lang;
    document.title = tr('title');
    $$('[data-i18n]').forEach(el => el.textContent = tr(el.dataset.i18n));
    $$('#sort-select option, #allocation-mode option').forEach(el => el.textContent = tr(el.dataset.i18n));
    $('#lang-btn').textContent = lang === 'en' ? 'DE' : 'EN';
    $('#partial-pill').textContent = tr('partial');
  }

  function parseCSV(text) {
    const rows = text.trim().split(/\r?\n/).filter(Boolean);
    if (rows.length < 2) return [];
    const head = rows[0].split(',').map(v => v.trim());
    return rows.slice(1).map(row => {
      const obj = {};
      row.split(',').forEach((v, i) => obj[head[i]] = v.trim());
      return obj;
    });
  }

  async function loadText(path) {
    try {
      const res = await fetch(path, { cache: 'no-store' });
      return res.ok ? await res.text() : '';
    } catch (_) {
      return '';
    }
  }

  function normalizeHistory(rows) {
    const labels = [], lowest = [], median = [];
    rows.forEach(r => {
      labels.push(r.date);
      lowest.push(Number(r.lowest) > 0 ? Number(r.lowest) : null);
      median.push(Number(r.median) > 0 ? Number(r.median) : null);
      if (r.currency) currency = r.currency.toUpperCase();
    });
    return { labels, lowest, median };
  }

  function normalizeBacktracked(rows) {
    const labels = [], value = [], coverage = [];
    rows.forEach(r => {
      labels.push(r.date);
      value.push(Number(r.value) > 0 ? Number(r.value) : null);
      coverage.push(Number(r.coverage_items) || 0);
      if (r.currency) currency = r.currency.toUpperCase();
    });
    return { labels, value, coverage };
  }

  function buildItemHistoryCache(raw) {
    const out = new Map();
    if (!raw || typeof raw !== 'object') return out;
    for (const [key, entry] of Object.entries(raw)) {
      if (!entry || !Array.isArray(entry.points) || !entry.points.length) continue;
      const name = key.includes(':') ? key.slice(key.indexOf(':') + 1) : key;
      out.set(name, entry.points);
    }
    return out;
  }

  function currentSeries() {
    if (basis === 'history' && backtracked.value.some(v => v != null)) return backtracked.value;
    return history[basis]?.some(v => v != null) ? history[basis] : history.median.concat(history.lowest);
  }

  function fillSelect(id, allKey, values) {
    const el = $(id);
    const current = el.value;
    el.innerHTML = `<option value="">${esc(tr(allKey))}</option>` +
      values.filter(Boolean).sort((a, b) => String(a).localeCompare(String(b)))
        .map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
    el.value = values.includes(current) ? current : '';
  }

  function refreshFilters() {
    const items = itemsData.items || [];
    fillSelect('#type-filter', 'typeAll', [...new Set(items.map(i => i.type || i.family))]);
    fillSelect('#exterior-filter', 'exteriorAll', [...new Set(items.map(i => i.exterior))]);
    fillSelect('#rarity-filter', 'rarityAll', [...new Set(items.map(i => i.rarity || i.quality))]);
    fillSelect('#account-filter', 'accountAll', [...new Set(items.flatMap(i => Object.keys(i.accounts || {})))]);
  }

  function selectedItems() {
    const q = $('#search').value.trim().toLowerCase();
    const type = $('#type-filter').value;
    const exterior = $('#exterior-filter').value;
    const rarity = $('#rarity-filter').value;
    const account = $('#account-filter').value;
    const min = inputNumber($('#min-price').value);
    const max = inputNumber($('#max-price').value);
    let rows = [...(itemsData.items || [])].filter(it => {
      const hay = [it.name, it.type, it.exterior, it.rarity, it.quality, it.collection, it.weapon, it.family].join(' ').toLowerCase();
      const unit = itemUnit(it);
      if (q && !hay.includes(q)) return false;
      if (type && (it.type || it.family) !== type) return false;
      if (exterior && it.exterior !== exterior) return false;
      if (rarity && (it.rarity || it.quality) !== rarity) return false;
      if (account && !(it.accounts || {})[account]) return false;
      if (min != null && unit != null && unit < min) return false;
      if (max != null && unit != null && unit > max) return false;
      if (onlyWatch && !watch.has(it.name)) return false;
      if (onlyMissing && unit != null) return false;
      return true;
    });
    const sort = $('#sort-select').value;
    rows.sort((a, b) => {
      if (sort === 'unit_desc') return (itemUnit(b) || 0) - (itemUnit(a) || 0);
      if (sort === 'qty_desc') return (b.qty || 0) - (a.qty || 0);
      if (sort === 'name_asc') return a.name.localeCompare(b.name);
      if (sort === 'watch_desc') return Number(watch.has(b.name)) - Number(watch.has(a.name)) || itemTotal(b) - itemTotal(a);
      return itemTotal(b) - itemTotal(a);
    });
    return rows;
  }

  function historyLatest(series) {
    return [...series].reverse().find(v => v != null);
  }

  function renderStats(rows) {
    const series = currentSeries();
    const latest = historyLatest(series);
    const prev = [...series.slice(0, -1)].reverse().find(v => v != null);
    const base30 = series.length > 30 ? series[series.length - 31] : null;
    const daily = latest != null && prev != null ? latest - prev : null;
    const dailyPct = pct(latest, prev);
    const month = latest != null && base30 != null ? latest - base30 : null;
    const monthPct = pct(latest, base30);
    const qty = rows.reduce((a, b) => a + (Number(b.qty) || 0), 0);
    const priced = rows.filter(i => itemUnit(i) != null).length;
    const commodity = rows.filter(i => i.commodity).reduce((a, b) => a + itemTotal(b), 0);
    const total = rows.reduce((a, b) => a + itemTotal(b), 0);
    const top = rows[0];
    const cards = [
      [tr('latest'), money(latest ?? total), `${basis}`],
      [tr('daily'), daily == null ? '-' : money(daily), dailyPct == null ? '' : `${dailyPct.toFixed(2)}%`, daily >= 0 ? 'pos' : 'neg'],
      [tr('month'), month == null ? '-' : money(month), monthPct == null ? '' : `${monthPct.toFixed(2)}%`, month >= 0 ? 'pos' : 'neg'],
      [tr('itemCount'), num(qty), `${num(rows.length)} names`],
      [tr('topItem'), top ? money(itemTotal(top)) : '-', top ? top.name : '-'],
      [tr('priced'), `${priced}/${rows.length}`, `${total ? ((commodity / total) * 100).toFixed(1) : '0.0'}% ${tr('liquidity')}`],
    ];
    $('#stats').innerHTML = cards.map(([label, value, sub, tone]) => `
      <article class="stat">
        <div class="label">${esc(label)}</div>
        <div class="value ${tone || ''}">${esc(value)}</div>
        <div class="sub">${esc(sub || '')}</div>
      </article>`).join('');
  }

  function renderItems() {
    const rows = selectedItems();
    renderStats(rows);
    renderAllocation(rows);
    $('#items-count').textContent = `${num(rows.length)} / ${num((itemsData.items || []).length)}`;
    $('#empty').classList.toggle('hidden', rows.length > 0);
    $('#table-view').classList.toggle('hidden', view !== 'table' || rows.length === 0);
    $('#card-view').classList.toggle('hidden', view !== 'cards' || rows.length === 0);

    $('#items-tbody').innerHTML = rows.map(it => `
      <tr>
        <td><button class="icon-btn ${watch.has(it.name) ? 'active' : ''}" data-watch="${esc(it.name)}" title="Watch">★</button></td>
        <td>
          <div class="item-cell">
            <img class="thumb" loading="lazy" src="${esc(it.icon_url || it.icon_url_large || '')}" alt="" />
            <div>
              <div class="item-name">${esc(it.name)}</div>
              <div class="chips">${family(it).map(v => `<span class="chip">${esc(v)}</span>`).join('')}</div>
            </div>
          </div>
        </td>
        <td class="num">${num(it.qty || 0)}</td>
        <td class="num">${money(itemUnit(it))}</td>
        <td class="num accent">${money(itemTotal(it))}</td>
        <td>
          <div class="row-actions">
            ${it.market_url ? `<a class="icon-btn" href="${esc(it.market_url)}" target="_blank" rel="noreferrer" title="Market">M</a>` : ''}
            ${it.inspect_url ? `<a class="icon-btn" href="${esc(it.inspect_url)}" title="Inspect">I</a>` : ''}
          </div>
        </td>
      </tr>`).join('');

    $('#card-view').innerHTML = rows.map(it => `
      <article class="item-card">
        <img class="thumb" loading="lazy" src="${esc(it.icon_url || it.icon_url_large || '')}" alt="" />
        <div>
          <div class="item-name">${esc(it.name)}</div>
          <div class="chips">${family(it).map(v => `<span class="chip">${esc(v)}</span>`).join('')}</div>
          <div class="card-price"><span>${num(it.qty || 0)}x ${money(itemUnit(it))}</span><b class="accent">${money(itemTotal(it))}</b></div>
          <div class="row-actions" style="margin-top:10px;justify-content:flex-start">
            <button class="icon-btn ${watch.has(it.name) ? 'active' : ''}" data-watch="${esc(it.name)}" title="Watch">★</button>
            ${it.market_url ? `<a class="icon-btn" href="${esc(it.market_url)}" target="_blank" rel="noreferrer" title="Market">M</a>` : ''}
            ${it.inspect_url ? `<a class="icon-btn" href="${esc(it.inspect_url)}" title="Inspect">I</a>` : ''}
          </div>
        </div>
      </article>`).join('');

    $$('[data-watch]').forEach(btn => btn.addEventListener('click', () => toggleWatch(btn.dataset.watch)));
  }

  function renderAllocation(rows) {
    const mode = $('#allocation-mode').value;
    const totals = new Map();
    rows.forEach(it => {
      if (mode === 'account') {
        const accounts = it.accounts && Object.keys(it.accounts).length ? it.accounts : { [tr('all')]: it.qty || 0 };
        Object.entries(accounts).forEach(([name, qty]) => {
          totals.set(name, (totals.get(name) || 0) + itemTotal(it) * (Number(qty) / Math.max(1, it.qty || 1)));
        });
      } else {
        const key = clean(it[mode] || (mode === 'rarity' ? it.quality : null) || it.family);
        totals.set(key, (totals.get(key) || 0) + itemTotal(it));
      }
    });
    const all = [...totals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
    const max = Math.max(...all.map(([, v]) => v), 1);
    $('#allocation-list').innerHTML = all.length ? all.map(([name, value]) => `
      <div class="bar-row">
        <div>
          <div>${esc(name)}</div>
          <div class="bar"><span style="width:${Math.max(2, (value / max) * 100)}%"></span></div>
        </div>
        <div class="num">${money(value)}</div>
      </div>`).join('') : `<div class="empty">${esc(tr('empty'))}</div>`;
  }

  function buildChartSeries() {
    const byDate = new Map();
    history.labels.forEach((date, i) => {
      if (!byDate.has(date)) byDate.set(date, {});
      byDate.get(date).median = history.median[i];
      byDate.get(date).lowest = history.lowest[i];
    });
    backtracked.labels.forEach((date, i) => {
      if (!byDate.has(date)) byDate.set(date, {});
      byDate.get(date).backtracked = backtracked.value[i];
    });

    const allLabels = [...byDate.keys()].sort();
    const count = span === 'all' ? allLabels.length : Math.min(Number(span), allLabels.length);
    const labels = allLabels.slice(-count);
    return {
      labels,
      median: labels.map(date => byDate.get(date)?.median ?? null),
      lowest: labels.map(date => byDate.get(date)?.lowest ?? null),
      backtracked: labels.map(date => byDate.get(date)?.backtracked ?? null),
    };
  }

  function renderChart() {
    const series = buildChartSeries();
    const datasets = [
      { label: tr('median'), data: series.median, borderColor: '#f0b84f', borderWidth: 2, pointRadius: 0, tension: .25, spanGaps: true },
      { label: tr('lowest'), data: series.lowest, borderColor: '#72c7ff', borderWidth: 1.5, pointRadius: 0, tension: .25, spanGaps: true },
    ];
    if (showBacktrack && series.backtracked.some(v => v != null)) {
      datasets.push({
        label: tr('backtracked'),
        data: series.backtracked,
        borderColor: '#42d392',
        borderWidth: 2,
        borderDash: [7, 5],
        pointRadius: 0,
        tension: .2,
        spanGaps: true,
      });
    }
    const ctx = $('#value-chart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: series.labels,
        datasets,
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: { ticks: { color: '#8a98aa', maxTicksLimit: 8 }, grid: { color: '#273141' } },
          y: { ticks: { color: '#8a98aa', callback: v => money(v) }, grid: { color: '#273141' } },
        },
        plugins: {
          legend: { labels: { color: '#b8c4d2' } },
          tooltip: { callbacks: { label: c => `${c.dataset.label}: ${money(c.parsed.y)}` } },
          zoom: {
            zoom: { wheel: { enabled: true }, drag: { enabled: true }, mode: 'x' },
            pan: { enabled: true, mode: 'x', modifierKey: 'shift' },
          },
          csEvents: { enabled: showEvents },
        },
      },
    });
    ctx.canvas.ondblclick = () => {
      span = 'all';
      $$('[data-span]').forEach(b => b.classList.toggle('active', b.dataset.span === span));
      renderChart();
    };
  }

  function setUpdated() {
    const date = itemsData.date || history.labels.at(-1);
    $('#currency-pill').textContent = currency;
    $('#partial-pill').classList.toggle('hidden', !itemsData.partial);
    if (!date) {
      $('#updated-pill').textContent = tr('noDate');
      return;
    }
    const diff = Math.round((new Date(new Date().toISOString().slice(0, 10)) - new Date(date)) / 86400000);
    $('#updated-pill').textContent = diff <= 0 ? tr('updatedToday') : tr('updatedAgo', { n: diff });
  }

  function toggleWatch(name) {
    if (watch.has(name)) watch.delete(name); else watch.add(name);
    localStorage.setItem(LS.watch, JSON.stringify([...watch]));
    renderItems();
  }

  function exportCSV() {
    const rows = selectedItems();
    const unitCol = basis === 'history' ? 'history_unit' : basis;
    const totalCol = basis === 'history' ? 'history_total' : `total_${basis}`;
    const cols = ['name','qty',unitCol,totalCol,'type','exterior','rarity','quality','collection','market_url'];
    const csv = [cols.join(',')].concat(rows.map(it => cols.map(k => `"${String(it[k] ?? '').replaceAll('"', '""')}"`).join(','))).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `steam-inventory-${itemsData.date || 'export'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function copyLinks() {
    const links = selectedItems().map(i => i.market_url).filter(Boolean).join('\n');
    if (!links) return flash('#copy-btn', tr('noLinks'));
    try {
      await navigator.clipboard.writeText(links);
      flash('#copy-btn', tr('linksCopied'));
    } catch (_) {
      flash('#copy-btn', 'ERR');
    }
  }

  function flash(sel, text) {
    const el = $(sel);
    const old = el.textContent;
    el.textContent = text;
    setTimeout(() => el.textContent = old, 1200);
  }

  function bind() {
    $('#lang-btn').addEventListener('click', () => {
      lang = lang === 'en' ? 'de' : 'en';
      localStorage.setItem(LS.lang, lang);
      applyI18n(); refreshFilters(); renderItems(); renderChart(); setUpdated();
    });
    $$('[data-basis]').forEach(btn => btn.addEventListener('click', () => {
      basis = btn.dataset.basis; localStorage.setItem(LS.basis, basis);
      $$('[data-basis]').forEach(b => b.classList.toggle('active', b.dataset.basis === basis));
      renderItems();
    }));
    $$('[data-view]').forEach(btn => btn.addEventListener('click', () => {
      view = btn.dataset.view; localStorage.setItem(LS.view, view);
      $$('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      renderItems();
    }));
    $$('[data-span]').forEach(btn => btn.addEventListener('click', () => {
      span = btn.dataset.span;
      $$('[data-span]').forEach(b => b.classList.toggle('active', b.dataset.span === span));
      renderChart();
    }));
    $('#backtrack-toggle').addEventListener('click', () => {
      showBacktrack = !showBacktrack;
      $('#backtrack-toggle').classList.toggle('active', showBacktrack);
      renderChart();
    });
    $('#events-toggle').addEventListener('click', () => {
      showEvents = !showEvents;
      $('#events-toggle').classList.toggle('active', showEvents);
      renderChart();
    });
    ['#search','#sort-select','#type-filter','#exterior-filter','#rarity-filter','#account-filter','#min-price','#max-price','#allocation-mode']
      .forEach(sel => $(sel).addEventListener('input', renderItems));
    $('#watch-filter').addEventListener('click', () => {
      onlyWatch = !onlyWatch; $('#watch-filter').classList.toggle('active', onlyWatch); renderItems();
    });
    $('#missing-filter').addEventListener('click', () => {
      onlyMissing = !onlyMissing; $('#missing-filter').classList.toggle('active', onlyMissing); renderItems();
    });
    $('#clear-btn').addEventListener('click', () => {
      ['#search','#type-filter','#exterior-filter','#rarity-filter','#account-filter','#min-price','#max-price'].forEach(sel => $(sel).value = '');
      onlyWatch = false; onlyMissing = false; $('#watch-filter').classList.remove('active'); $('#missing-filter').classList.remove('active');
      renderItems();
    });
    $('#export-btn').addEventListener('click', exportCSV);
    $('#copy-btn').addEventListener('click', copyLinks);
    $$('th[data-sort]').forEach(th => th.addEventListener('click', () => {
      const map = { name: 'name_asc', qty: 'qty_desc', unit: 'unit_desc', total: 'total_desc', watch: 'watch_desc' };
      $('#sort-select').value = map[th.dataset.sort] || 'total_desc';
      renderItems();
    }));
  }

  (async function init() {
    applyI18n();
    const cfg = await loadText('config.json');
    try {
      const parsed = JSON.parse(cfg || '{}');
      if (parsed.currency) currency = parsed.currency.toUpperCase();
      if (!localStorage.getItem(LS.lang) && parsed.language) lang = parsed.language.slice(0, 2).toLowerCase();
    } catch (_) {}

    const [valuesText, accountsText, itemsText, backtrackedText, itemHistoryText] = await Promise.all([
      loadText('values.csv'),
      loadText('accounts.csv'),
      loadText('items.json'),
      loadText('backtracked_values.csv'),
      loadText('item_history_cache.json'),
    ]);
    history = normalizeHistory(parseCSV(valuesText));
    backtracked = normalizeBacktracked(parseCSV(backtrackedText));
    try { historyByItem = buildItemHistoryCache(JSON.parse(itemHistoryText || '{}')); } catch (_) { historyByItem = new Map(); }
    accounts = parseCSV(accountsText);
    try { itemsData = JSON.parse(itemsText || '{"items":[]}'); } catch (_) { itemsData = { items: [] }; }
    if (itemsData.currency) currency = itemsData.currency.toUpperCase();
    itemsData.items = (itemsData.items || []).map(it => ({
      market_url: it.market_url || `https://steamcommunity.com/market/listings/730/${encodeURIComponent(it.name || '')}?l=german`,
      family: it.family || clean((it.name || '').split('|')[0]),
      ...it,
    }));

    applyI18n();
    setUpdated();
    refreshFilters();
    bind();
    $$('[data-basis]').forEach(b => b.classList.toggle('active', b.dataset.basis === basis));
    $$('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    renderChart();
    renderItems();
  })();
  </script>
</body>
</html>

name: Daily Inventory Fetch

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests

      - name: Run inventory tracker
        run: python fetch_inventory.py
        env:
          STEAM_API_KEY: ${{ secrets.KEY }}

      - name: Commit CSV updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values.csv accounts.csv items.json price_cache.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CS2 inventory values $(date -u +'%Y-%m-%d')"
            git push
          fi